<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mapa Electoral — Vallegrande 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#0b0d12; --panel:#13161e; --panel2:#181c27; --border:#1e2333;
  --accent:#f0c040; --red:#e05252; --orange:#e07c3a; --green:#4caf7d;
  --blue:#4a90d9; --purple:#9b6dd9; --text:#c8d0e0; --muted:#4e566e; --white:#edf2ff;
  --radius:8px; --shadow:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--text);overflow:hidden}

/* ── SEARCH OVERLAY (Google style) ── */
#search-overlay{
  position:fixed;top:0;left:0;right:0;z-index:3000;
  padding:10px 12px;
  background:linear-gradient(to bottom,rgba(11,13,18,.98) 80%,transparent);
  pointer-events:none;
}
#search-box{
  pointer-events:all;
  display:flex;align-items:center;gap:10px;
  background:var(--panel);
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:0 16px;
  height:48px;
  box-shadow:var(--shadow);
  transition:border-color .2s,box-shadow .2s;
  max-width:680px;
  margin:0 auto;
  position:relative;
}
#search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.12),var(--shadow)}
#search-icon{color:var(--muted);font-size:16px;flex-shrink:0}
#search-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--white);
  min-width:0;
}
#search-input::placeholder{color:var(--muted)}
#search-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;display:none;flex-shrink:0}
#search-clear:hover{color:var(--white)}

/* results dropdown */
#search-results{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);display:none;max-height:60vh;overflow-y:auto;
  z-index:100;
}
.sr-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .15s;
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover,.sr-item.focused{background:rgba(240,192,64,.08)}
.sr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.sr-hab{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0}
.sr-empty{padding:16px;text-align:center;font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* stats pills below search */
#stats-row{
  pointer-events:all;
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-top:8px;padding:0 4px;
}
.s-pill{
  background:rgba(19,22,30,.9);border:1px solid var(--border);border-radius:20px;
  padding:3px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;
  display:flex;align-items:center;gap:5px;color:var(--muted);white-space:nowrap;
}
.s-pill strong{color:var(--white);font-size:11px}

/* MAP */
#map{position:fixed;inset:0;z-index:1}

/* ── BOTTOM SHEET (mobile detail) ── */
#bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:2000;
  background:var(--panel);
  border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
#bottom-sheet.open{transform:translateY(0)}

#sheet-handle{
  display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0;cursor:pointer;
}
#sheet-handle::before{content:'';width:36px;height:4px;background:var(--border);border-radius:2px}
#sheet-header{
  padding:4px 16px 12px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#sheet-color{width:12px;height:12px;border-radius:50%;margin-top:5px;flex-shrink:0}
#sheet-title-wrap{flex:1;min-width:0}
#sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;line-height:1.1}
#sheet-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px}
#sheet-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px;flex-shrink:0}
#sheet-close:hover{color:var(--white)}

#sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
#sheet-body::-webkit-scrollbar{width:3px}
#sheet-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── DESKTOP SIDE PANEL ── */
#side-panel{
  position:fixed;right:0;top:0;bottom:0;width:360px;z-index:1500;
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:-4px 0 24px rgba(0,0,0,.4);
}
#side-panel.open{transform:translateX(0)}
#sp-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
#sp-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
#sp-close:hover{color:var(--white)}
#sp-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:1px;margin-top:4px;line-height:1.1}
#sp-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:3px}
#sp-body{overflow-y:auto;flex:1}
#sp-body::-webkit-scrollbar{width:3px}
#sp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── SHARED CONTENT STYLES ── */
.sec{padding:14px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}

.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kv{background:var(--bg);border-radius:6px;padding:8px 10px}
.kv-k{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kv-v{font-size:16px;font-weight:700;color:var(--white);margin-top:1px;font-family:'IBM Plex Mono',monospace}
.kv-v.gold{color:var(--accent)}
.kv-v.purple{color:var(--purple)}

.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;border:1px solid}

/* Historical tabs */
.tab-row{display:flex;gap:0;background:var(--bg);border-radius:6px;padding:2px;margin-bottom:12px}
.tab{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:5px 4px;border-radius:4px;cursor:pointer;color:var(--muted);letter-spacing:.3px;transition:all .2s;border:none;background:none}
.tab.active{background:var(--panel2);color:var(--white)}

.hist-panel{display:none}
.hist-panel.active{display:block}

/* Party bar */
.party-row{margin-bottom:8px}
.party-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.party-name{font-size:11px;font-weight:600;color:var(--white)}
.party-votes{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.bar-track{height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}

.stat-row{display:flex;justify-content:space-between;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.stat-row span{color:var(--text)}

/* Age bars */
.age-wrap{display:flex;flex-direction:column;gap:6px}
.age-row-d{display:flex;align-items:center;gap:8px}
.age-lbl{width:52px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-align:right;flex-shrink:0}
.age-bar-outer{flex:1;background:var(--bg);border-radius:3px;height:16px;overflow:hidden;position:relative}
.age-bar-inner{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;color:rgba(255,255,255,.8)}
.age-num{width:28px;text-align:right;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text);flex-shrink:0}

/* GPS button */
.gps-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.3);
  color:var(--accent);border-radius:6px;padding:10px 14px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.5px;
  transition:all .2s;text-decoration:none;
}
.gps-btn:hover{background:rgba(240,192,64,.18)}

/* Legend pill on map */
#legend{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(19,22,30,.92);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;z-index:900;display:flex;gap:14px;align-items:center;
  backdrop-filter:blur(8px);
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FILTER BAR */
#filter-bar{
  position:fixed;top:76px;left:0;right:0;z-index:890;
  display:flex;gap:6px;padding:0 12px;overflow-x:auto;
  scrollbar-width:none;pointer-events:none;
}
#filter-bar::-webkit-scrollbar{display:none}
.fb-wrap{pointer-events:all;display:flex;gap:6px}
.fbt{
  background:rgba(19,22,30,.88);border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:all .2s;backdrop-filter:blur(4px);
  flex-shrink:0;
}
.fbt.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}

/* Leaflet */
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--border)!important;border-radius:8px!important;box-shadow:var(--shadow)!important;color:var(--text)!important;font-family:'IBM Plex Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--panel)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:12px!important}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:16px!important}
.leaflet-tooltip{background:var(--panel)!important;border:1px solid var(--border)!important;color:var(--white)!important;font-family:'IBM Plex Mono',monospace!important;font-size:11px!important;padding:4px 10px!important;border-radius:20px!important;box-shadow:none!important}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important}

/* ── RESPONSIVE ── */
@media(min-width:700px){
  #bottom-sheet{display:none}
  #search-overlay{max-width:420px;left:0;right:auto;padding:12px}
  #stats-row{justify-content:flex-start}
  #filter-bar{left:0;right:auto;max-width:420px}
  #legend{left:auto;right:380px;transform:none;bottom:20px}
}
@media(max-width:699px){
  #side-panel{display:none}
  #legend{bottom:80px}
  #filter-bar{top:72px}
}
</style>
</head>

// ── MAP INIT ───────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:false}).setView([-18.62,-64.05],9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',maxZoom:19
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// ── MARKERS ────────────────────────────────────────────────────────────
function radius(h){return h>=2000?22:h>=1000?18:h>=500?14:h>=200?10:h>=100?7:5}

let markerObjs=[];
DATA.forEach((d,i)=>{
  const m=L.circleMarker([d.lat,d.lng],{
    radius:radius(d.hab),fillColor:PC[d.prioridad],
    color:'#0b0d12',weight:2,fillOpacity:.85
  }).addTo(map);
  m.bindTooltip(d.recinto.length>30?d.recinto.slice(0,28)+'…':d.recinto,{permanent:false,direction:'top'});
  m.on('click',()=>openDetail(i));
  markerObjs.push({m,d,i});
});

// ── FILTER LOGIC ───────────────────────────────────────────────────────
let activeFilter='all';
document.querySelectorAll('.fbt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fbt').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter=btn.dataset.f;
    applyFilters();
  });
});

function matches(d){
  if(activeFilter==='all') return true;
  return d.prioridad===activeFilter||d.ideologia===activeFilter;
}
function applyFilters(q=''){
  markerObjs.forEach(({m,d})=>{
    const vis=matches(d)&&matchQ(d,q);
    vis?(map.hasLayer(m)||map.addLayer(m)):(map.hasLayer(m)&&map.removeLayer(m));
  });
}

// ── SEARCH ────────────────────────────────────────────────────────────
const inp=document.getElementById('search-input');
const clr=document.getElementById('search-clear');
const res=document.getElementById('search-results');
let focusedIdx=-1;

function matchQ(d,q){
  if(!q) return true;
  const s=(d.recinto+' '+d.asiento+' '+d.ideologia+' '+d.distrito+' '+d.zona).toLowerCase();
  return s.includes(q.toLowerCase());
}

function highlight(text,q){
  if(!q) return text;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return text;
  return text.slice(0,i)+'<mark style="background:rgba(240,192,64,.35);color:var(--white);border-radius:2px">'+text.slice(i,i+q.length)+'</mark>'+text.slice(i+q.length);
}

function renderResults(q){
  if(!q){res.style.display='none';focusedIdx=-1;return}
  const hits=DATA.map((d,i)=>({d,i})).filter(({d})=>matchQ(d,q));
  if(!hits.length){
    res.innerHTML='<div class="sr-empty">Sin resultados para "'+q+'"</div>';
    res.style.display='block';return;
  }
  res.innerHTML=hits.slice(0,8).map(({d,i},ri)=>`
    <div class="sr-item" data-idx="${i}" data-ri="${ri}">
      <div class="sr-dot" style="background:${PC[d.prioridad]}"></div>
      <div class="sr-info">
        <div class="sr-name">${highlight(d.recinto,q)}</div>
        <div class="sr-sub">${highlight(d.asiento,q)} · ${d.mesas} mesa${d.mesas>1?'s':''} · ${d.ideologia}</div>
      </div>
      <div class="sr-hab">${d.hab.toLocaleString()}</div>
    </div>`).join('');
  res.style.display='block';
  res.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=+el.dataset.idx;
      closeSearch();
      map.setView([DATA[idx].lat,DATA[idx].lng],14,{animate:true});
      setTimeout(()=>openDetail(idx),300);
    });
  });
  focusedIdx=-1;
}

inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  clr.style.display=q?'block':'none';
  renderResults(q);
  applyFilters(q);
});

inp.addEventListener('keydown',e=>{
  const items=res.querySelectorAll('.sr-item');
  if(e.key==='ArrowDown'){e.preventDefault();focusedIdx=Math.min(focusedIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIdx))}
  else if(e.key==='ArrowUp'){e.preventDefault();focusedIdx=Math.max(focusedIdx-1,0);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIdx))}
  else if(e.key==='Enter'&&focusedIdx>=0){items[focusedIdx].click()}
  else if(e.key==='Escape'){closeSearch()}
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#search-box')) closeSearch();
});

function closeSearch(){
  res.style.display='none';
  inp.blur();
  focusedIdx=-1;
}
function clearSearch(){
  inp.value='';clr.style.display='none';
  res.style.display='none';applyFilters();
}
clr.addEventListener('click',clearSearch);

// ── DETAIL CONTENT BUILDER ────────────────────────────────────────────
function buildContent(d){

          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${maxV>0?Math.round(votes/maxV*100):0}%;background:${PTC[name]||'#aaa'}"></div></div>

      <div class="stat-row">
        <span>Ganador: <span style="color:${PTC[ganador]||'#aaa'};font-weight:700">${ganador} ${winPct>0?winPct+'%':''}</span></span>

  }

  return `
    <div class="sec">
      <div class="sec-title">Resumen del Recinto</div>
      <div class="kv-grid">
        <div class="kv"><div class="kv-k">Habilitados</div><div class="kv-v gold">${d.hab.toLocaleString()}</div></div>
        <div class="kv"><div class="kv-k">% del Padrón</div><div class="kv-v">${d.pct_total}%</div></div>
        <div class="kv"><div class="kv-k">Mesas</div><div class="kv-v">${d.mesas}</div></div>
        <div class="kv"><div class="kv-k">Sondeo (9 cand.)</div><div class="kv-v purple">${d.sondeo}</div></div>

      <div class="badges" style="margin-top:10px">
        <span class="badge" style="background:${pc}18;color:${pc};border-color:${pc}44">⬤ ${d.prioridad}</span>
        <span class="badge" style="background:${ic}18;color:${ic};border-color:${ic}44">${d.ideologia}</span>
        <span class="badge" style="background:${perfC}18;color:${perfC};border-color:${perfC}44">PERFIL ${d.perfil}</span>
      </div>
      <div style="margin-top:8px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted)">${d.distrito} · ${d.zona}</div>
    </div>

    <div class="sec">
      <div class="sec-title">Perfil Etario</div>
      <div class="age-wrap">
        ${[['Joven 18–30',d.joven,d.pjoven,'#e07c3a'],['Adulto 31–50',d.adulto,d.padulto,'#4caf7d'],['Mayor 51+',d.mayor,d.pmayor,'#4a90d9']]
          .map(([l,n,p,c])=>`
          <div class="age-row-d">
            <div class="age-lbl">${l}</div>
            <div class="age-bar-outer">
              <div class="age-bar-inner" style="width:${Math.round(n/maxAge*100)}%;background:${c}">${p>12?p+'%':''}</div>
            </div>
            <div class="age-num">${n}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Resultados Históricos</div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab(this,'t1v')">1ª Vuelta 2025</button>

function switchTab(btn,id){
  btn.closest('.sec').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

}

  const content=buildContent(d);

  // Highlight marker
  markerObjs.forEach(({m,d:md})=>m.setStyle({weight:md===d?3.5:2,color:md===d?'#f0c040':'#0b0d12'}));

  if(isMobile()){
    document.getElementById('sheet-color').style.background=PC[d.prioridad];
    document.getElementById('sheet-title').textContent=d.recinto;
    document.getElementById('sheet-sub').textContent='📍 '+d.asiento+' · '+d.mesas+' mesa'+(d.mesas>1?'s':'');
    document.getElementById('sheet-body').innerHTML=content;
    document.getElementById('bottom-sheet').classList.add('open');
  } else {
    document.getElementById('sp-title').textContent=d.recinto;
    document.getElementById('sp-sub').textContent='📍 '+d.asiento+' · '+d.mesas+' mesa'+(d.mesas>1?'s':'');
    document.getElementById('sp-body').innerHTML=content;
    document.getElementById('side-panel').classList.add('open');
    // adjust legend
    document.getElementById('legend').style.right='380px';
  }
}

function closeDetail(){
  currentIdx=null;
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('legend').style.right='';
  markerObjs.forEach(({m})=>m.setStyle({weight:2,color:'#0b0d12'}));
}

// Touch swipe down to close sheet
let touchStartY=0;
document.getElementById('bottom-sheet').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.getElementById('bottom-sheet').addEventListener('touchmove',e=>{
  if(e.touches[0].clientY-touchStartY>60&&document.getElementById('sheet-body').scrollTop===0) closeDetail();
},{passive:true});

// Resize handler
window.addEventListener('resize',()=>{
  if(!isMobile()){
    document.getElementById('bottom-sheet').classList.remove('open');
    if(currentIdx!==null) openDetail(currentIdx);
  } else {
    document.getElementById('side-panel').classList.remove('open');
    if(currentIdx!==null) openDetail(currentIdx);
  }
});
</script>
</body>
</html>
